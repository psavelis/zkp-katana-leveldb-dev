run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
    exclude-functions:
      - fmt.Printf
      - fmt.Println
  govet:
    enable-all: false
  staticcheck:
    checks: ["all", "-SA1019", "-SA4010"]  # Ignore deprecation and append warnings

issues:
  exclude-rules:
    # Ignore long lines in test files
    - path: _test\.go
      linters:
        - lll
    # Ignore error checking in test helpers
    - path: _test\.go
      linters:
        - errcheck
    # Allow shadowing in tests
    - path: _test\.go
      linters:
        - govet
      text: "shadow"
    # Ignore errcheck and ineffassign in benchmark and demo (intentional for readability)
    - path: cmd/benchmark/main\.go
      linters:
        - errcheck
        - ineffassign
    - path: cmd/demo/main\.go
      linters:
        - errcheck
        - ineffassign
  max-issues-per-linter: 50
  max-same-issues: 10
