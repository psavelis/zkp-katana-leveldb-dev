run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
  disable:
    - structcheck  # Deprecated
    - deadcode     # Deprecated
    - varcheck     # Deprecated

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
  govet:
    enable-all: false
  staticcheck:
    checks: ["all", "-SA1019"]  # Ignore deprecation warnings for gnark

issues:
  exclude-rules:
    # Ignore long lines in test files
    - path: _test\.go
      linters:
        - lll
    # Ignore error checking in test helpers
    - path: _test\.go
      linters:
        - errcheck
    # Allow shadowing in tests
    - path: _test\.go
      linters:
        - govet
      text: "shadow"
  max-issues-per-linter: 50
  max-same-issues: 10
